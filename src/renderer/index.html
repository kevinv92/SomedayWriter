<!doctype html>
<!-- data-theme/accent default to the shipped light theme so cold start paints
     warm paper before React hydrates and applies the persisted choice (the CSP
     forbids an inline bootstrap script). -->
<html lang="en" data-theme="light" data-accent="ink">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta
      http-equiv="Content-Security-Policy"
      content="default-src 'self'; script-src 'self'; style-src 'self' 'unsafe-inline'; img-src 'self' data: writer-asset:; font-src 'self' data:"
    />
    <title>SomedayWriter</title>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
